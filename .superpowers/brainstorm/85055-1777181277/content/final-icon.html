<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HappyCode Final Icon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0e0e12;
    color: #e8e6f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 0;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 48px;
  }
  h2 { font-size: 13px; color: #5a5678; letter-spacing: 0.8px; text-transform: uppercase; }
  .row {
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }
  .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .item span { font-size: 11px; color: #44405c; }
  .contexts {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-top: 8px;
  }
  .ctx {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
  }
  .ctx.dark { background: #1a1a22; color: #888; }
  .ctx.light { background: #f0f0f4; color: #444; }
  .ctx.mid { background: #2c2840; color: #998bcc; }
</style>
</head>
<body>
<div class="stage">
  <h2>HappyCode — Final Icon</h2>

  <!-- Sizes -->
  <div class="row">
    <div class="item">
      <svg width="128" height="128" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bg1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/>
            <stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
          <linearGradient id="sh1" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bg1)"/>
        <rect width="40" height="22" rx="10" fill="url(#sh1)"/>
        <rect x="0" y="10" width="40" height="12" fill="url(#sh1)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      <span>128px</span>
    </div>

    <div class="item">
      <svg width="64" height="64" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bg2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/>
            <stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
          <linearGradient id="sh2" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bg2)"/>
        <rect width="40" height="22" rx="10" fill="url(#sh2)"/>
        <rect x="0" y="10" width="40" height="12" fill="url(#sh2)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      <span>64px</span>
    </div>

    <div class="item">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bg3" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/>
            <stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
          <linearGradient id="sh3" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bg3)"/>
        <rect width="40" height="22" rx="10" fill="url(#sh3)"/>
        <rect x="0" y="10" width="40" height="12" fill="url(#sh3)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      <span>40px</span>
    </div>

    <div class="item">
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bg4" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/>
            <stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bg4)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      <span>24px</span>
    </div>

    <div class="item">
      <svg width="16" height="16" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bg5" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/>
            <stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bg5)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      <span>16px</span>
    </div>
  </div>

  <!-- Context check -->
  <div class="contexts">
    <div class="ctx dark">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bgc1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/><stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bgc1)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>
      dark sidebar
    </div>
    <div class="ctx light">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bgc2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/><stop offset="100%" stop-color="#3d1fc0"/>

        <circle cx="30" cy="15" r="2.2" fill="white"/>

    </div>
    <div class="ctx mid">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="bgc3" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b0ff"/><stop offset="100%" stop-color="#3d1fc0"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="10" fill="url(#bgc3)"/>
        <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6" stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none"/>
        <circle cx="30" cy="15" r="2.2" fill="white"/>
        <circle cx="30" cy="25" r="2.2" fill="white"/>
      </svg>

    </div>
  </div>
</div>
</body>
</html>

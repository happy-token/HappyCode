<svg width="1024" height="1024" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b0ff" />
      <stop offset="100%" stop-color="#3d1fc0" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.22" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)" />

  <!-- Top shine overlay -->
  <rect width="40" height="22" rx="10" fill="url(#shine)" />
  <rect x="0" y="10" width="40" height="12" fill="url(#shine)" />

  <!-- Giant C: center(17,20), radius 12, opening right -->
  <!-- endpoints verified: sqrt((24.2-17)^2 + (10.4-20)^2) = sqrt(51.84+92.16) = 12 -->
  <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6"
        stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none" />

  <!-- Eyes peek from the C opening -->
  <circle cx="30" cy="15" r="2.2" fill="white" />
  <circle cx="30" cy="25" r="2.2" fill="white" />
</svg>

<svg width="1024" height="1024" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5C842" />
      <stop offset="100%" stop-color="#C27A0E" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="4" x2="0" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.28" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <clipPath id="squircle">
      <rect x="4" y="4" width="32" height="32" rx="7" ry="7" />
    </clipPath>
  </defs>

  <!-- Squircle: 10% padding each side matches macOS icon spec -->
  <rect x="4" y="4" width="32" height="32" rx="7" ry="7" fill="url(#bg)" />

  <!-- Shine clipped to squircle -->
  <g clip-path="url(#squircle)">
    <rect x="4" y="4" width="32" height="18" fill="url(#shine)" />
    <rect x="4" y="14" width="32" height="10" fill="url(#shine)" />
  </g>

  <!-- Logo scaled from original 40×40 coords into the 32×32 content area -->
  <!-- translate(4,4) then scale(0.8) maps 0..40 → 4..36 -->
  <g transform="translate(4,4) scale(0.8)" clip-path="url(#squircle)">
    <path d="M24.2,10.4 A12,12 0 1 0 24.2,29.6"
          stroke="white" stroke-width="4.2" stroke-linecap="round" fill="none" />
    <circle cx="30" cy="15" r="2.2" fill="white" />
    <circle cx="30" cy="25" r="2.2" fill="white" />
  </g>
</svg>
